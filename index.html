<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutzwertanalyse Optimizer</title>
<style>
body { font-family: Arial,sans-serif; margin:20px; background:#f0f4f8; color:#111; }
h1 { text-align:center; color:#0077cc; }
form { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
input, select { padding:6px 10px; font-size:14px; border:1px solid #ccc; border-radius:4px; }
button { padding:6px 12px; font-size:14px; border:none; border-radius:4px; background:#0077cc; color:white; cursor:pointer; }
button:hover { background:#005fa3; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { padding:8px 12px; border:1px solid #ccc; text-align:center; }
th { background:#0077cc; color:white; }
</style>
</head>
<body>

<h1>Nutzwertanalyse Optimizer</h1>

<h3>Set Total Constraint Limit:</h3>
<input type="number" id="totalConstraintLimit" placeholder="Max total constraint" step="0.01" value="100">

<form id="itemForm">
<input type="text" id="itemName" placeholder="Item Name" required>
<select id="constraintType">
<option value="capacity">Capacity</option>
<option value="time">Time</option>
<option value="cost">Cost</option>
<option value="other">Other</option>
</select>
<input type="number" id="constraintValue" placeholder="Constraint Value" required min="0.01" step="0.01">
<input type="number" id="benefitValue" placeholder="Benefit / Value" required step="0.01">
<button type="submit">Add Item</button>
</form>

<button onclick="calculateOptimal()">Select Optimal Items</button>

<table>
<thead>
<tr>
<th>#</th><th>Item</th><th>Constraint</th><th>Value</th><th>Weighted Benefit</th><th>Selected</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

<script>
let items = [];

document.getElementById('itemForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('itemName').value.trim();
    const constraint = document.getElementById('constraintType').value;
    const constraintValue = parseFloat(document.getElementById('constraintValue').value);
    const benefit = parseFloat(document.getElementById('benefitValue').value);
    if(constraintValue <= 0){ alert("Constraint must be > 0"); return; }
    const weightedBenefit = benefit / constraintValue;
    items.push({name, constraint, constraintValue, benefit, weightedBenefit, selected:false});
    renderTable();
    this.reset();
});

function renderTable(){
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    items.forEach((item,i)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td>${i+1}</td>
        <td>${item.name}</td>
        <td>${item.constraintValue.toFixed(2)} (${item.constraint})</td>
        <td>${item.benefit.toFixed(2)}</td>
        <td>${item.weightedBenefit.toFixed(2)}</td>
        <td>${item.selected ? '✅' : ''}</td>
        `;
        tbody.appendChild(tr);
    });
}

// Greedy selection: pick items by weighted benefit until total constraint limit is reached
function calculateOptimal(){
    const limit = parseFloat(document.getElementById('totalConstraintLimit').value);
    if(limit<=0){ alert("Total constraint must be > 0"); return; }
    // Reset selection
    items.forEach(item=>item.selected=false);
    let remaining = limit;
    // Sort items descending by weighted benefit
    const sorted = [...items].sort((a,b)=>b.weightedBenefit - a.weightedBenefit);
    for(let item of sorted){
        if(item.constraintValue <= remaining){
            item.selected = true;
            remaining -= item.constraintValue;
        }
    }
    renderTable();
}
</script>

</body>
</html>

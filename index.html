<!DOCTYPE html>
<html>
<head>
  <title>Mini Strategy Game</title>
</head>
<body>
  <h1>Maximize Profit</h1>
  <p>Budget: 100</p>
  <button onclick="invest()">Invest in Marketing</button>
  <p id="result"></p>

  <script>
    let budget = 100;
    let profit = 0;

    function invest() {
      if (budget >= 20) {
        budget -= 20;
        profit += Math.floor(Math.random() * 50);
        document.getElementById("result").innerText =
          "Profit: " + profit + " | Budget: " + budget;
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Age of War - Advanced</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    touch-action: none;
}

canvas { display: block; }

.ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffff;
    text-align: center;
    font-size: 14px;
}

button {
    margin: 4px;
    padding: 8px 14px;
    background: #00ffff;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.gameover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ffff;
    font-size: 28px;
    text-align: center;
    display: none;
}
</style>
</head>

<body>

<div class="ui">
    Gold: <span id="gold">10</span> |
    Player HP: <span id="playerHP">1000</span> |
    Enemy HP: <span id="enemyHP">1000</span>
    <br>
    <button onclick="spawnUnit('warrior')">Warrior (10)</button>
    <button onclick="spawnUnit('archer')">Archer (20)</button>
    <button onclick="spawnUnit('tank')">Tank (50)</button>
</div>

<div class="gameover" id="gameOverScreen">
    <div id="gameOverText"></div>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let dpi = window.devicePixelRatio || 1;

function resizeCanvas() {
    canvas.width = window.innerWidth * dpi;
    canvas.height = window.innerHeight * dpi;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpi, 0, 0, dpi, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const groundY = () => window.innerHeight * 0.75;

let gold = 10;
let playerBaseHP = 1000;
let enemyBaseHP = 1000;
let units = [];
let gameRunning = true;

const UNIT_STATS = {
    warrior: { hp: 120, damage: 20, speed: 1.2, range: 0, cost: 10, reward: 10 },
    archer:  { hp: 70,  damage: 15, speed: 1, range: 120, cost: 20, reward: 20 },
    tank:    { hp: 300, damage: 40, speed: 0.6, range: 0, cost: 50, reward: 50 }
};

class Unit {
    constructor(type, isPlayer) {
        this.type = type;
        this.isPlayer = isPlayer;
        const stats = UNIT_STATS[type];
        this.hp = stats.hp;
        this.maxHp = stats.hp;
        this.damage = stats.damage;
        this.speed = isPlayer ? stats.speed : -stats.speed;
        this.range = stats.range;
        this.reward = stats.reward;

        this.width = 30;
        this.height = 50;
        this.x = isPlayer ? 60 : window.innerWidth - 90;
        this.y = groundY();
        this.attackCooldown = 0;
    }

    draw() {
        ctx.fillStyle = this.isPlayer ? "#00ffff" : "#ff0066";
        ctx.fillRect(this.x, this.y - this.height, this.width, this.height);

        ctx.fillStyle = "red";
        ctx.fillRect(this.x, this.y - this.height - 8, this.width, 4);
        ctx.fillStyle = "lime";
        ctx.fillRect(this.x, this.y - this.height - 8, this.width * (this.hp / this.maxHp), 4);
    }

    update(delta) {
        if (!gameRunning) return;

        let enemy = units.find(u =>
            u.isPlayer !== this.isPlayer &&
            Math.abs(u.x - this.x) <= (this.range || this.width)
        );

        if (enemy) {
            if (this.attackCooldown <= 0) {
                enemy.hp -= this.damage;
                this.attackCooldown = 700;
            }
        } else {
            this.x += this.speed;
        }

        if (this.attackCooldown > 0) this.attackCooldown -= delta;
        this.draw();
    }
}

function spawnUnit(type) {
    if (!gameRunning) return;
    const cost = UNIT_STATS[type].cost;
    if (gold >= cost) {
        gold -= cost;
        units.push(new Unit(type, true));
    }
}

function spawnEnemy() {
    if (!gameRunning) return;

    const rand = Math.random();
    let type;
    if (rand < 0.5) type = "warrior";
    else if (rand < 0.8) type = "archer";
    else type = "tank";

    units.push(new Unit(type, false));
}

setInterval(spawnEnemy, 2500);

let lastTime = 0;

function gameLoop(timestamp) {
    let delta = timestamp - lastTime;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffff";
    ctx.fillRect(10, groundY() - 120, 50, 120);

    ctx.fillStyle = "#ff0066";
    ctx.fillRect(window.innerWidth - 60, groundY() - 120, 50, 120);

    units.forEach(unit => unit.update(delta));

    // Handle deaths and gold rewards
    units = units.filter(unit => {
        if (unit.hp <= 0) {
            if (!unit.isPlayer) gold += unit.reward;
            return false;
        }
        return true;
    });

    // Base damage
    units.forEach(unit => {
        if (unit.isPlayer && unit.x + unit.width >= window.innerWidth - 60) {
            enemyBaseHP -= unit.damage;
            unit.hp = 0;
        }
        if (!unit.isPlayer && unit.x <= 60) {
            playerBaseHP -= unit.damage;
            unit.hp = 0;
        }
    });

    document.getElementById("gold").innerText = gold;
    document.getElementById("playerHP").innerText = playerBaseHP;
    document.getElementById("enemyHP").innerText = enemyBaseHP;

    if (playerBaseHP <= 0 || enemyBaseHP <= 0) {
        gameRunning = false;
        showGameOver();
    }

    requestAnimationFrame(gameLoop);
}

function showGameOver() {
    const screen = document.getElementById("gameOverScreen");
    const text = document.getElementById("gameOverText");
    text.innerText = playerBaseHP <= 0 ? "Defeat" : "Victory!";
    screen.style.display = "block";
}

function restartGame() {
    gold = 10;
    playerBaseHP = 1000;
    enemyBaseHP = 1000;
    units = [];
    gameRunning = true;
    document.getElementById("gameOverScreen").style.display = "none";
}

requestAnimationFrame(gameLoop);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Age of War</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    touch-action: none;
}

canvas {
    display: block;
}

.ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffff;
    text-align: center;
    font-size: 14px;
}

button {
    margin-top: 8px;
    padding: 8px 16px;
    background: #00ffff;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.gameover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ffff;
    font-size: 28px;
    text-align: center;
    display: none;
}
</style>
</head>

<body>

<div class="ui">
    Gold: <span id="gold">0</span> |
    Player HP: <span id="playerHP">1000</span> |
    Enemy HP: <span id="enemyHP">1000</span>
    <br>
    <button id="spawnBtn">Spawn Unit (Cost: 50)</button>
</div>

<div class="gameover" id="gameOverScreen">
    <div id="gameOverText"></div>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let dpi = window.devicePixelRatio || 1;

function resizeCanvas() {
    canvas.width = window.innerWidth * dpi;
    canvas.height = window.innerHeight * dpi;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpi, 0, 0, dpi, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const groundY = () => window.innerHeight * 0.75;

let gold = 0;
let playerBaseHP = 1000;
let enemyBaseHP = 1000;
let units = [];
let gameRunning = true;

const UNIT_COST = 50;
const GOLD_RATE = 10;
const ENEMY_SPAWN_INTERVAL = 2500;

class Unit {
    constructor(x, isPlayer) {
        this.x = x;
        this.y = groundY();
        this.width = 30;
        this.height = 50;
        this.hp = 100;
        this.maxHp = 100;
        this.speed = isPlayer ? 1 : -1;
        this.isPlayer = isPlayer;
        this.attackCooldown = 0;
    }

    draw() {
        ctx.fillStyle = this.isPlayer ? "#00ffff" : "#ff0066";
        ctx.fillRect(this.x, this.y - this.height, this.width, this.height);

        // Health bar
        ctx.fillStyle = "red";
        ctx.fillRect(this.x, this.y - this.height - 10, this.width, 5);
        ctx.fillStyle = "lime";
        ctx.fillRect(this.x, this.y - this.height - 10, this.width * (this.hp / this.maxHp), 5);
    }

    update(delta) {
        if (!gameRunning) return;

        let target = units.find(u => u.isPlayer !== this.isPlayer && Math.abs(u.x - this.x) < this.width);

        if (target) {
            if (this.attackCooldown <= 0) {
                target.hp -= 20;
                this.attackCooldown = 500;
            }
        } else {
            this.x += this.speed;
        }

        if (this.attackCooldown > 0) this.attackCooldown -= delta;

        this.draw();
    }
}

function spawnPlayerUnit() {
    if (gold >= UNIT_COST && gameRunning) {
        gold -= UNIT_COST;
        units.push(new Unit(50, true));
    }
}

function spawnEnemyUnit() {
    if (!gameRunning) return;
    units.push(new Unit(window.innerWidth - 80, false));
}

document.getElementById("spawnBtn").addEventListener("click", spawnPlayerUnit);
document.getElementById("spawnBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    spawnPlayerUnit();
}, { passive: false });

setInterval(() => {
    if (gameRunning) gold += GOLD_RATE;
}, 1000);

setInterval(spawnEnemyUnit, ENEMY_SPAWN_INTERVAL);

let lastTime = 0;

function gameLoop(timestamp) {
    let delta = timestamp - lastTime;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw bases
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(10, groundY() - 100, 40, 100);

    ctx.fillStyle = "#ff0066";
    ctx.fillRect(window.innerWidth - 50, groundY() - 100, 40, 100);

    units.forEach(unit => unit.update(delta));

    // Remove dead units
    units = units.filter(unit => unit.hp > 0);

    // Base damage
    units.forEach(unit => {
        if (unit.isPlayer && unit.x + unit.width >= window.innerWidth - 50) {
            enemyBaseHP -= 10;
            unit.hp = 0;
        }
        if (!unit.isPlayer && unit.x <= 50) {
            playerBaseHP -= 10;
            unit.hp = 0;
        }
    });

    document.getElementById("gold").innerText = gold;
    document.getElementById("playerHP").innerText = playerBaseHP;
    document.getElementById("enemyHP").innerText = enemyBaseHP;

    if (playerBaseHP <= 0 || enemyBaseHP <= 0) {
        gameRunning = false;
        showGameOver();
    }

    requestAnimationFrame(gameLoop);
}

function showGameOver() {
    const screen = document.getElementById("gameOverScreen");
    const text = document.getElementById("gameOverText");
    text.innerText = playerBaseHP <= 0 ? "Defeat" : "Victory!";
    screen.style.display = "block";
}

function restartGame() {
    gold = 0;
    playerBaseHP = 1000;
    enemyBaseHP = 1000;
    units = [];
    gameRunning = true;
    document.getElementById("gameOverScreen").style.display = "none";
}

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
